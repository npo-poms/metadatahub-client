# Test configuration for MetadataHub SPARQL Client

# OAuth2 - Will be overridden by @DynamicPropertySource in tests
metadatahub.oauth2.token-uri=http://localhost:8080/auth/realms/test/protocol/openid-connect/token
metadatahub.oauth2.client-id=test-client
metadatahub.oauth2.client-secret=test-secret
metadatahub.oauth2.scope=openid profile email

# SPARQL Endpoint - Mock endpoint for testing
metadatahub.sparql-endpoint=http://localhost:8080/sparql

# HTTP Client Configuration - Short timeouts for testing
metadatahub.client.connect-timeout-ms=5000
metadatahub.client.read-timeout-ms=10000
metadatahub.client.write-timeout-ms=10000

# Logging
logging.level.nl.npo.metadatahub.client=DEBUG
logging.level.org.springframework=WARN

