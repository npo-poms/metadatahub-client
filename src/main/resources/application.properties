# MetadataHub SPARQL Client Configuration
# See: https://docs.metadatahub.bijnpo.nl/

# SPARQL Endpoint
metadatahub.sparql-endpoint=http://localhost:8080/sparql

# OAuth2 Configuration for Keycloak
metadatahub.oauth2.token-uri=http://localhost:8080/auth/realms/metadatahub/protocol/openid-connect/token
metadatahub.oauth2.client-id=metadatahub-client
metadatahub.oauth2.client-secret=${METADATAHUB_CLIENT_SECRET}
metadatahub.oauth2.scope=openid profile email

# HTTP Client Configuration
metadatahub.client.connect-timeout-ms=10000
metadatahub.client.read-timeout-ms=30000
metadatahub.client.write-timeout-ms=30000

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.sparqlService.register-health-indicator=true
resilience4j.circuitbreaker.instances.sparqlService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.sparqlService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.sparqlService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.sparqlService.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.sparqlService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.sparqlService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.sparqlService.sliding-window-size=10

# Logging
logging.level.nl.npo.metadatahub.client=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

